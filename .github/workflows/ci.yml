name: ci

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tjek at .gitignore eksisterer
        run: test -f .gitignore

      - name: Tjek at claude-code ikke bruger @latest
        run: |
          if grep -q "claude-code@latest" .devcontainer/Dockerfile; then
            echo "FEJL: claude-code er ikke pinnet — brug en konkret version"
            exit 1
          fi
          echo "OK: claude-code er pinnet"

      - name: Tjek at ingen .env-filer er committed
        run: |
          if git ls-files | grep -qE '^\.env'; then
            echo "FEJL: .env-fil er committed"
            exit 1
          fi
          echo "OK: ingen .env-filer committed"
